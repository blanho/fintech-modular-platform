# FinTech Modular Platform — Docker Compose
# Usage:
#   docker compose up -d                   Start all infrastructure
#   docker compose up -d postgres redis rabbitmq   Infrastructure only
#   docker compose --profile app up -d     Infrastructure + API
#   docker compose down -v                 Tear down with volumes

name: fintech-platform

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 — schema-per-module isolation
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fintech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fintech}
      POSTGRES_USER: ${POSTGRES_USER:-fintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintech_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintech} -d ${POSTGRES_DB:-fintech}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - fintech-network

  # ─────────────────────────────────────────────
  # pgAdmin 4 — database management UI
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fintech-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@fintech.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintech-network

  # ─────────────────────────────────────────────
  # Redis 7 — caching + token blacklisting
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fintech-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --save 60 1000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fintech-network

  # ─────────────────────────────────────────────
  # Redis Commander — Redis management UI
  # ─────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fintech-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fintech-network

  # ─────────────────────────────────────────────
  # RabbitMQ 3.13 — async messaging (MassTransit)
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fintech-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fintech}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fintech_dev_password}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"         # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - fintech-network

  # ─────────────────────────────────────────────
  # FinTech API — .NET 9 modular monolith
  # (activate with: --profile app)
  # ─────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: fintech-api
    restart: unless-stopped
    profiles:
      - app
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-fintech};Username=${POSTGRES_USER:-fintech};Password=${POSTGRES_PASSWORD:-fintech_dev_password}"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER:-fintech}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-fintech_dev_password}
      Jwt__Secret: ${JWT_SECRET:-FinTechPlatformSuperSecretKeyThatIsAtLeast32CharactersLong2024!}
      Jwt__Issuer: fintech-api
      Jwt__Audience: fintech-client
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fintech-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  fintech-network:
    driver: bridge
